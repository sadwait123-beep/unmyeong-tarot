<!DOCTYPE html>
<html lang="ko">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>운명타로</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet" />

    color: var(--cream); font-family:"Gowun Dodum",sans-serif; }
  .wrap { max-width:500px; margin:0 auto; }
  .head { text-align:center; margin-bottom:18px; }
  .kicker { font-size:12px; letter-spacing:6px; color:var(--gold); }
  h1 { font-family:"Nanum Myeongjo",serif; font-weight:800; font-size:38px; margin:6px 0 4px;
    text-shadow:0 0 18px rgba(233,196,106,.35); }
  .sub { color:var(--muted); font-size:14px; }
  .tabs { display:flex; gap:8px; margin:16px 0 20px; }
  .tab { flex:1; padding:9px 6px; border-radius:12px; cursor:pointer; text-align:center;
    border:1px solid rgba(233,196,106,.4); background:rgba(255,255,255,.04);
    color:var(--muted); font-family:"Nanum Myeongjo",serif; font-size:13.5px; }
  .tab.active { background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#2a1a0a; font-weight:700; }
  label { display:block; font-size:15px; margin-bottom:10px; color:var(--gold-soft); }
  textarea { width:100%; padding:14px; border-radius:12px; resize:none; outline:none;
    border:1px solid rgba(233,196,106,.4); background:rgba(255,255,255,.04);
    color:var(--cream); font-size:15px; font-family:"Gowun Dodum",sans-serif; }
  textarea::placeholder { color:#7d75a3; }
  select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(233,196,106,.4);
    background:rgba(255,255,255,.04); color:var(--cream); font-size:14px; font-family:"Gowun Dodum",sans-serif;
    outline:none; margin-bottom:14px; }
  select option { background:#160f30; color:var(--cream); }
  .btn { width:100%; margin-top:12px; padding:15px; border-radius:14px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#2a1a0a;
    font-size:16px; font-weight:700; font-family:"Nanum Myeongjo",serif; letter-spacing:2px;
    transition:transform .15s, filter .15s; }
  .btn:hover { transform:translateY(-2px); filter:brightness(1.08); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.ghost { background:rgba(233,196,106,.12); border:1px solid var(--gold); color:var(--gold-soft); }
  .btn.plain { background:transparent; color:#8a82ac; font-family:"Gowun Dodum",sans-serif; font-size:14px; }
  .note { color:#6f6796; font-size:11px; text-align:center; margin-top:12px; }
  .qline { text-align:center; color:var(--muted); font-size:14px; margin-bottom:16px; }
  .qline b { color:var(--gold-soft); }
  @keyframes dealIn { from{opacity:0;transform:perspective(900px) rotateY(85deg) translateY(10px);} to{opacity:1;transform:perspective(900px) rotateY(0) translateY(0);} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .spread { display:flex; gap:10px; justify-content:center; }
  .col { flex:1; max-width:33%; }
  .pos { text-align:center; font-size:12px; color:var(--gold-soft); letter-spacing:1px; margin-bottom:6px; font-family:"Nanum Myeongjo",serif; }
  .mini { border-radius:13px; overflow:hidden; border:2px solid var(--gold);
    background:linear-gradient(160deg,#3a2a6e,#1c1442);
    box-shadow:0 8px 20px rgba(0,0,0,.45);
    animation:dealIn .7s cubic-bezier(.2,.8,.2,1) both; }
  .mpic { position:relative; height:210px; background:#0d0a1f; display:flex; align-items:center; justify-content:center; }
  .mpic img { width:100%; height:100%; object-fit:contain; }
  .mbadge { position:absolute; top:6px; left:6px; font-size:10px; font-weight:700; color:#2a1a0a;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); padding:1px 7px; border-radius:12px; }
  .mrev { position:absolute; top:6px; right:6px; font-size:9px; color:var(--cream);
    background:rgba(0,0,0,.55); padding:1px 6px; border-radius:12px; border:1px solid var(--gold); }
  .chip { position:absolute; bottom:6px; right:6px; width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px;
    box-shadow:0 1px 4px rgba(0,0,0,.45); }
  .mname { font-family:"Nanum Myeongjo",serif; font-weight:700; font-size:13px; text-align:center; padding:7px 2px 8px; }
  .spreadmark { text-align:center; font-size:9px; letter-spacing:3px; color:rgba(244,213,141,.55); margin-top:8px; }
  .reading { margin-top:14px; }
  .rblock { background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.22);
    border-radius:14px; padding:14px 16px; margin-bottom:10px; line-height:1.7; font-size:14px;
    white-space:pre-line; animation:fadeUp .5s ease both; }
  .rlabel { display:block; font-family:"Nanum Myeongjo",serif; font-weight:700; font-size:14px;
    color:var(--gold-soft); margin-bottom:5px; }
  .rclose { background:linear-gradient(160deg,rgba(233,196,106,.16),rgba(233,196,106,.06));
    border:1px solid rgba(233,196,106,.35); border-radius:14px; padding:14px 16px;
    line-height:1.7; font-size:14px; white-space:pre-line; animation:fadeUp .5s ease both; }
  .rclose b { color:var(--gold-soft); }
  .spin { width:26px; height:26px; border:3px solid rgba(233,196,106,.25); border-top-color:var(--gold);
    border-radius:50%; margin:6px auto 12px; animation:spin .8s linear infinite; }
  .loadbox { background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.22);
    border-radius:14px; padding:18px; text-align:center; color:var(--muted); }
  .entry { margin-bottom:30px; }
  .divider { border-top:1px solid rgba(233,196,106,.2); padding-top:18px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cell { border:1px solid rgba(233,196,106,.3); border-radius:10px; overflow:hidden; background:#0d0a1f; }
  .cell img { width:100%; aspect-ratio:5/8; object-fit:contain; display:block; background:#0d0a1f; }
  .cell .cn { font-size:11px; text-align:center; padding:5px 2px; }
  .streak { text-align:center; font-size:16px; margin-bottom:10px; }
  .streak b { color:var(--gold-soft); font-family:"Nanum Myeongjo",serif; }
  .stamps { display:flex; gap:6px; justify-content:center; margin-bottom:20px; }
  .stamp { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:var(--muted); border:1px solid rgba(233,196,106,.3); background:rgba(255,255,255,.03); }
  .stamp.on { color:#2a1a0a; background:linear-gradient(135deg,var(--gold),var(--gold-soft)); border-color:var(--gold); font-weight:700; }
  .stamp.today { box-shadow:0 0 0 2px rgba(244,213,141,.55); }
  .dwrap { margin-bottom:14px; }
  .dcard { width:210px; margin:0 auto; border-radius:13px; overflow:hidden; border:2px solid var(--gold);
    background:linear-gradient(160deg,#3a2a6e,#1c1442); box-shadow:0 10px 26px rgba(0,0,0,.5);
    animation:dealIn .7s cubic-bezier(.2,.8,.2,1) both; }
  .dailyask { text-align:center; padding:14px 0; }
  .modal { position:fixed; inset:0; background:rgba(8,5,20,.82); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .sheet { background:#160f30; border:1px solid rgba(233,196,106,.4); border-radius:18px; padding:20px;

  .mblock { text-align:left; background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.22);
    border-radius:12px; padding:12px 14px; margin-top:10px; font-size:14px; line-height:1.65; }
  .mlabel { display:block; font-family:"Nanum Myeongjo",serif; font-weight:700; color:var(--gold-soft); margin-bottom:4px; }
  .taphint { text-align:center; color:#6f6796; font-size:11px; margin-top:8px; }
  .hide { display:none; }

</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">✦ FATE TAROT ✦</div>
    <h1>운명타로</h1>
    <div class="sub">과거·현재·미래, 세 장으로 보는 운명</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabDraw" onclick="showTab('draw')">🔮 점보기</div>
    <div class="tab" id="tabDaily" onclick="showTab('daily')">📅 오늘의 카드</div>
    <div class="tab" id="tabGallery" onclick="showTab('gallery')">🎴 갤러리</div>
  </div>

  <div id="draw">
    <div id="askBox">
      <label>어떤 방식으로 볼까?</label>
      <select id="spreadSel" onchange="currentSpread = this.selectedIndex">
        <option>과거 · 현재 · 미래</option>
        <option>상황 · 행동 · 결과</option>
        <option>나 · 상대 · 관계 (연애)</option>
        <option>문제 · 원인 · 조언</option>
      </select>
      <label>무엇이 궁금해? 마음속 질문을 적어줘.</label>
      <textarea id="q" rows="3" placeholder="예) 내 미래의 직업은 어떤 모습일까?"></textarea>
      <button class="btn" id="drawBtn" onclick="firstDraw()">🔮 과거·현재·미래 3장 펼치기</button>
      <div class="note">78장 중 서로 다른 3장을 무작위로 뽑아요</div>
    </div>
    <div id="reading" class="hide">
      <div id="thread"></div>
      <div class="divider">
        <label>더 깊이 들어가 볼까? 이어서 물어봐.</label>
        <textarea id="q2" rows="2" placeholder="예) 그 직업에서 성공하려면 뭐가 필요할까?"></textarea>
        <button class="btn" id="moreBtn" onclick="moreDraw()">🃏 새로 3장 더 펼치기</button>
      </div>
      <button class="btn ghost" id="shareBtn" onclick="share()">💌 상담 전체 공유하기</button>
      <div id="shareBox"></div>
      <div class="note">📸 화면을 캡처해서 친구에게 자랑해도 좋아요!</div>
      <button class="btn plain" onclick="resetAll()">✦ 처음부터 다시</button>
      <div class="note">운명타로는 재미로 보는 콘텐츠예요 :)</div>
    </div>
  </div>

  <div id="gallery" class="hide">
    <div class="note" style="margin-top:0;margin-bottom:12px">스크롤하면 78장의 진짜 타로 그림이 모두 떠요 ✦</div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="daily" class="hide">
    <div id="streakBar"></div>
    <div id="dailyContent"></div>
  </div>

  <div id="modal" class="modal hide" onclick="closeCard()">
    <div class="sheet" onclick="event.stopPropagation()"><div id="modalBody"></div></div>
  </div>
</div>

    {u:"현실적 돌봄, 풍요로움, 안정적 보살핌.", r:"일과 삶의 불균형, 자기돌봄 부족."},
    {u:"성취, 안정, 풍요, 든든한 리더.", r:"물질 집착, 완고함, 불안정."},
  ];

  CARDS.forEach((c,i)=>{ c.img=CARD_IMG[i]; c.idx=i; c.meaning=MEANINGS[i]; });

  // 뽑기 방식(스프레드) — 3장의 자리가 질문에 따라 다른 의미를 가짐
  const SPREADS = [
    { name:"과거 · 현재 · 미래", pos:["과거","현재","미래"] },
    { name:"상황 · 행동 · 결과", pos:["지금 상황","해야 할 행동","예상 결과"] },
    { name:"나 · 상대 · 관계 (연애)", pos:["나의 마음","상대의 마음","관계의 흐름"] },
    { name:"문제 · 원인 · 조언", pos:["지금의 문제","숨은 원인","해결의 실마리"] },
  ];
  let currentSpread = 0;
  let entries = [];
  let seq = 0;

  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function pick3(){
    const idx = [...Array(CARDS.length).keys()];
    for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
    return idx.slice(0,3).map(k=>({ card: CARDS[k], reversed: Math.random()<0.4 }));
  }

  // 카드 3장: 하나씩 차례로 펼쳐지는 애니메이션(딜레이)
  function spreadHTML(cards, positions){
    const cols = cards.map((cc,i)=>{
      const c = cc.card, rev = cc.reversed, th = c.theme;
      return `<div class="col"><div class="pos">${esc(positions[i])}</div>
        <div class="mini" onclick="openCard(${c.idx})" style="cursor:pointer;animation-delay:${(i*0.22).toFixed(2)}s;border-color:${th.edge};background:linear-gradient(160deg,${th.grad[0]},${th.grad[1]})">
        <div class="mpic" style="background:${th.grad[1]}"><img src="${c.img}" alt="${esc(c.ko)}" style="transform:${rev?'rotate(180deg)':'none'}" />
        <div class="mbadge">${c.badge}</div>${rev?'<div class="mrev">역</div>':''}
        <div class="chip" style="background:${th.edge}">${th.chip}</div></div>
        <div class="mname">${esc(c.ko)}</div></div></div>`;
    }).join("");
    return `<div class="spread">${cols}</div><div class="spreadmark">✦ 운명타로 ✦</div><div class="taphint">카드를 누르면 자세한 의미가 떠요</div>`;
  }

  // 풀이 영역: 로딩 / 오류 / 과거·현재·미래 따로 + 총평
  function readingBody(e){
    if(e.loading) return '<div class="loadbox"><div class="spin"></div>세 장의 기운을 읽는 중...</div>';
    if(e.error) return '<div class="loadbox" style="color:#ff9d9d">운명의 기운이 잠시 흐려졌어. 다시 펼쳐볼래?</div>';
    const d = e.data;
    if(d && d.p1 && d.p2 && d.p3){
      const txt = [d.p1, d.p2, d.p3];
      const row=(i)=>`<div class="rblock" style="animation-delay:${(i*0.1).toFixed(2)}s"><span class="rlabel">${esc(e.positions[i])} · ${esc(e.cards[i].card.ko)}</span>${esc(txt[i])}</div>`;
      let html = row(0)+row(1)+row(2);
      if(d.advice) html += `<div class="rblock"><span class="rlabel">🔑 조언</span>${esc(d.advice)}</div>`;
      if(d.closing) html += `<div class="rclose"><b>총평 ✦</b> ${esc(d.closing)}</div>`;
      return html;
    }
    // 형식이 깨졌을 때: 표시를 정리해서 통째로라도 읽기 좋게
    return `<div class="rblock">${esc((e.raw||"").replace(/\[\[\s*(1|2|3|조언|총평)\s*\]\]/g,"\n").trim())}</div>`;
  }

  function renderThread(){
    document.getElementById("thread").innerHTML = entries.map((e,i)=>
      `<div class="entry"><div class="qline"><b>Q${i+1}.</b> ${esc(e.q)} <span style="color:#6f6796">· ${esc(e.spreadName)}</span></div>${spreadHTML(e.cards, e.positions)}<div class="reading" id="reading-${e.id}">${readingBody(e)}</div></div>`
    ).join("");
  }
  function updateReading(e){
    const el = document.getElementById("reading-"+e.id);
    if(el) el.innerHTML = readingBody(e);
  }

  function buildPrompt(prior, q, cards, positions, spreadName){
    const persona = "너는 '운명타로' 앱의 신비롭고 깊이 있는 타로 마스터야. 딱딱하지 않고 친한 친구처럼 편하게 반말로, 하지만 아주 자세하고 풍부하게 풀어줘.";
    const cardLines = cards.map((cc,i)=>{
      const m = cc.reversed ? cc.card.meaning.r : cc.card.meaning.u;
      return `- ${i+1}번 자리(${positions[i]}): ${cc.card.ko} (${cc.card.en}) ${cc.reversed?'역방향':'정방향'} — 전통 의미: ${m}`;
    }).join("\n");
    let ctx = "";
    if(prior.length){
      ctx = "지금까지의 상담 흐름:\n" + prior.map((e,i)=>{
        const s = e.cards.map((cc,j)=>`${e.positions[j]} ${cc.card.ko}(${cc.reversed?'역':'정'})`).join(", ");
        const sum = e.data ? (e.data.closing||"") : "";
        return `${i+1}) "${e.q}" → [${s}] → ${sum}`;
      }).join("\n") + "\n\n";
    }
    return persona + "\n" + ctx + (prior.length?"이어지는 추가 질문":"질문") + `: "${q}"\n\n`
      + `이번 뽑기 방식은 '${spreadName}'이야. 1번 자리는 '${positions[0]}', 2번 자리는 '${positions[1]}', 3번 자리는 '${positions[2]}'를 뜻해.\n`
      + "뽑힌 카드:\n" + cardLines + "\n\n"
      + (prior.length ? "앞의 상담 흐름과도 자연스럽게 이어서, " : "")
      + "각 카드를 그 자리의 의미로 아주 상세하게 풀어줘. "
      + "특히 카드 그림 속 상징을 구체적으로 짚어줘 — 인물의 옷 색깔, 손에 든 물건, 자세, 배경 풍경 같은 걸 언급하고, 그게 무슨 의미인지, 그리고 그게 그 자리(질문 속 상황)와 어떻게 연결되는지 풀어줘.\n"
      + "예시 느낌: \"검 여왕의 흰 드레스와 푸른 망토는 맑은 이성과 차분한 감정을 뜻하는데, 이건 네가 그 자리에서 감정을 누르고 냉정하게 판단했음을 보여줘…\" 처럼 그림의 상징을 의미·상황과 연결해서 자세히.\n\n"
      + "아래 형식 그대로, 각 항목을 [[ ]] 표시로 구분해서만 답해. 인사말·마크다운·다른 말은 절대 붙이지 마. (숫자 1·2·3은 각각 위의 1·2·3번 자리 풀이야.)\n\n"
      + `[[1]]\n(1번 '${positions[0]}' 자리 풀이, 그림 상징을 짚으며 5~7문장)\n`
      + `[[2]]\n(2번 '${positions[1]}' 자리 풀이 5~7문장)\n`
      + `[[3]]\n(3번 '${positions[2]}' 자리 풀이 5~7문장)\n`
      + "[[조언]]\n(지금 무엇을 하면 좋을지 구체적 조언 3~4문장)\n"
      + "[[총평]]\n(세 장을 아우르는 따뜻한 마무리 2~3문장)\n\n"
      + "조건: 한국어, 친구처럼 편한 반말, 단정적 단언은 피하고, 신비롭지만 따뜻하고 이해하기 쉽게.";
  }

  async function callAI(prompt){
    const r = await fetch("/api/reading", {
      method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ prompt })
    });
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error || "오류");
    return d.text;
  }

  function parseReading(text){
    const keys = { "1":"p1", "2":"p2", "3":"p3", "조언":"advice", "총평":"closing" };
    const parts = String(text).split(/\[\[\s*(1|2|3|조언|총평)\s*\]\]/);
    const out = {};
    for(let i=1;i<parts.length;i+=2){
      const label = parts[i];
      const content = (parts[i+1]||"").replace(/^[\s:：]+/,"").trim();
      if(keys[label] && content) out[keys[label]] = content;
    }
    if(out.p1 && out.p2 && out.p3) return out;
    return null;
  }

  async function draw(q){
    const cards = pick3();
    const prior = entries.slice();
    const sp = SPREADS[currentSpread];
    const entry = { id: ++seq, q, cards, positions: sp.pos.slice(), spreadName: sp.name, data:null, raw:"", loading:true, error:false };
    entries.push(entry);
    document.getElementById("askBox").classList.add("hide");
    document.getElementById("reading").classList.remove("hide");
    document.getElementById("shareBox").innerHTML = "";
    document.getElementById("moreBtn").disabled = true;
    renderThread();
    window.scrollTo({ top: 0, behavior: "smooth" });
    try {
      const text = await callAI(buildPrompt(prior, q, cards, entry.positions, entry.spreadName));
      entry.raw = text;
      entry.data = parseReading(text);
    } catch(e) {
      entry.error = true;
    } finally {
      entry.loading = false;
      document.getElementById("moreBtn").disabled = false;
      updateReading(entry);
    }
  }

  function firstDraw(){
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    draw(q);
  }
  function moreDraw(){
    const el = document.getElementById("q2");
    const q = el.value.trim();
    if(!q) return;
    el.value = "";
    draw(q);
  }
  function resetAll(){
    entries = [];
    document.getElementById("q").value = "";
    document.getElementById("reading").classList.add("hide");
    document.getElementById("askBox").classList.remove("hide");
  }

  function shareText(){
    return "🔮 운명타로\n\n" + entries.map((e,i)=>{
      const s = e.cards.map((cc,j)=>`${e.positions[j]} ${cc.card.ko}${cc.reversed?'(역)':''}`).join(" / ");
      let body = "";
      if(e.data) body = `${e.positions[0]}: ${e.data.p1}\n${e.positions[1]}: ${e.data.p2}\n${e.positions[2]}: ${e.data.p3}` + (e.data.advice?`\n조언: ${e.data.advice}`:"") + (e.data.closing?`\n총평: ${e.data.closing}`:"");
      else body = e.raw||"";
      return `Q${i+1}. ${e.q} (${e.spreadName})\n[${s}]\n${body}`;
    }).join("\n\n") + "\n\n— 운명타로에서 뽑았어 ✦";
  }
  async function share(){
    if(!entries.length) return;
    const text = shareText();
    if(navigator.share){ try { await navigator.share({title:"운명타로 🔮", text}); return; } catch(e){} }
    try { await navigator.clipboard.writeText(text); } catch(e){}
    document.getElementById("shareBox").innerHTML =
      `<p style="color:var(--gold-soft);font-size:13px;margin:12px 0 6px">아래 글을 복사해서 친구에게 보내봐 👇</p>
       <textarea readonly rows="10" onclick="this.select()" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--gold);background:rgba(0,0,0,.25);color:var(--cream);font-size:13px;line-height:1.6">${esc(text)}</textarea>`;
    const ta = document.querySelector("#shareBox textarea"); if(ta){ ta.focus(); ta.select(); }
  }

  function showTab(which){
    ["draw","daily","gallery"].forEach(k=>{
      document.getElementById(k).classList.toggle("hide", k!==which);
      const tab = document.getElementById("tab"+k.charAt(0).toUpperCase()+k.slice(1));
      if(tab) tab.classList.toggle("active", k===which);
    });
    if(which==="gallery") buildGallery();
    if(which==="daily") renderDaily();
  }
  let galleryBuilt = false;
  function buildGallery(){
    if(galleryBuilt) return; galleryBuilt = true;
    document.getElementById("grid").innerHTML = CARDS.map(c=>`<div class="cell" onclick="openCard(${c.idx})" style="cursor:pointer;border-color:${c.theme.edge}"><img loading="lazy" src="${c.img}" alt="${esc(c.ko)}" /><div class="cn">${esc(c.ko)}</div></div>`).join("");
  }

  // 카드 의미 사전 창
  function openCard(i){
    const c = CARDS[i], m = c.meaning, th = c.theme;
    document.getElementById("modalBody").innerHTML =
      `<div class="dcard" style="margin-bottom:8px;border-color:${th.edge};background:linear-gradient(160deg,${th.grad[0]},${th.grad[1]})">
         <div class="mpic" style="height:250px;background:${th.grad[1]}"><img src="${c.img}" alt="${esc(c.ko)}" />
         <div class="mbadge">${c.badge}</div><div class="chip" style="background:${th.edge}">${th.chip}</div></div>
         <div class="mname" style="font-size:17px">${esc(c.ko)}</div>
         <div style="font-size:11px;color:var(--muted);padding-bottom:9px">${c.en} · ${c.arcana}</div></div>
       <div class="mblock"><span class="mlabel">정방향 ▲</span>${esc(m.u)}</div>
       <div class="mblock"><span class="mlabel">역방향 ▼</span>${esc(m.r)}</div>
       <button class="btn plain" onclick="closeCard()">닫기</button>`;
    document.getElementById("modal").classList.remove("hide");
  }
  function closeCard(){ document.getElementById("modal").classList.add("hide"); }

  /* ───────── 오늘의 카드 + 출석 도장 ───────── */
  // (저장 기능: 실제 웹사이트에서 작동. 막힌 환경이면 자동으로 그냥 넘어가요.)
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function todayStr(){ return ymd(new Date()); }
  function dayDiff(a,b){ return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00"))/86400000); }

  let dailyEntry = null;
  function loadDaily(){
    try { const raw=lsGet("ut_daily"); if(raw){ const o=JSON.parse(raw); if(o && o.date===todayStr()) dailyEntry=o; } } catch(e){}
  }
  function saveDaily(){ lsSet("ut_daily", JSON.stringify(dailyEntry)); }

  function getStreak(){ try { return JSON.parse(lsGet("ut_streak")||"{}"); } catch(e){ return {}; } }
  function markAttendance(){
    const s = getStreak(); const t = todayStr();
    let visited = s.visited || [];
    if(!visited.includes(t)){
      if(s.last){ const diff = dayDiff(s.last, t); if(diff===1) s.count=(s.count||0)+1; else if(diff>1) s.count=1; }
      else { s.count = 1; }
      s.last = t; visited.push(t); if(visited.length>40) visited = visited.slice(-40); s.visited = visited;
      lsSet("ut_streak", JSON.stringify(s));
    }
  }

  function dailyCardHTML(e){
    const c = CARDS[e.cardIndex], rev = e.reversed, th = c.theme;
    return `<div class="dwrap"><div class="dcard" onclick="openCard(${e.cardIndex})" style="cursor:pointer;border-color:${th.edge};background:linear-gradient(160deg,${th.grad[0]},${th.grad[1]})">
      <div class="mpic" style="height:300px;background:${th.grad[1]}"><img src="${c.img}" alt="${esc(c.ko)}" style="transform:${rev?'rotate(180deg)':'none'}" />
      <div class="mbadge">${c.badge}</div>${rev?'<div class="mrev">역</div>':''}
      <div class="chip" style="background:${th.edge}">${th.chip}</div></div>
      <div class="mname" style="font-size:16px">${esc(c.ko)}</div>
      <div style="font-size:11px;color:var(--muted);padding-bottom:9px">${rev?'역방향':'정방향'} · ${c.arcana}</div>
      </div></div>`;
  }
  function dailyReadingHTML(e){
    if(e.loading) return '<div class="loadbox"><div class="spin"></div>오늘의 기운을 읽는 중...</div>';
    if(e.error) return '<div class="loadbox" style="color:#ff9d9d">기운이 잠시 흐려졌어. 잠시 후 다시 들어와줘!</div>';
    return `<div class="rclose"><b>오늘의 운세 ✦</b> ${esc(e.reading)}</div>`;
  }

  function renderDaily(){
    const s = getStreak();
    const visited = new Set(s.visited||[]);
    const days = ["일","월","화","수","목","금","토"];
    let stamps = "";
    for(let i=6;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i); const ds=ymd(d);
      const on = visited.has(ds), today = ds===todayStr();
      stamps += `<div class="stamp ${on?'on':''} ${today?'today':''}">${on?'✦':days[d.getDay()]}</div>`;
    }
    document.getElementById("streakBar").innerHTML =
      `<div class="streak">🔥 <b>${s.count||0}일</b> 연속 출석</div><div class="stamps">${stamps}</div>`;

    const box = document.getElementById("dailyContent");
    if(dailyEntry){
      box.innerHTML = dailyCardHTML(dailyEntry) + dailyReadingHTML(dailyEntry);
    } else {
      box.innerHTML = `<div class="dailyask"><p style="color:var(--muted);margin-bottom:4px">오늘 당신을 위한 카드 한 장을 받아보세요.</p>
        <button class="btn" onclick="drawDaily()">📅 오늘의 카드 받기</button></div>`;
    }
  }

  async function drawDaily(){
    const k = Math.floor(Math.random()*CARDS.length);
    const reversed = Math.random()<0.4;
    dailyEntry = { date: todayStr(), cardIndex:k, reversed, reading:"", loading:true, error:false };
    saveDaily(); markAttendance(); renderDaily();
    try {
      const c = CARDS[k];
      const prompt = "너는 '운명타로' 앱의 신비로운 타로 마스터야. 친한 친구처럼 편하게 반말로 얘기해.\n"
        + `오늘 뽑은 '오늘의 카드': ${c.ko} (${c.en}) - ${reversed?'역방향':'정방향'}\n`
        + "이 카드 한 장으로 오늘 하루의 운세를 따뜻하고 재미있게 알려줘.\n"
        + "규칙: 한국어 2~3문장, 카드 이름을 자연스럽게 언급, 가볍고 기운 나게, 재미로 보는 분위기.";
      dailyEntry.reading = await callAI(prompt);
    } catch(e){ dailyEntry.error = true; }
    finally { dailyEntry.loading=false; saveDaily(); renderDaily(); }
  }

  loadDaily();
</script>
</body>
</html>
