<html lang="ko">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>운명타로</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

  .wrap { max-width:500px; margin:0 auto; }
  .head { text-align:center; margin-bottom:18px; }
  .kicker { font-size:12px; letter-spacing:6px; color:var(--gold); }

    text-shadow:0 0 18px rgba(233,196,106,.35); }
  .sub { color:var(--muted); font-size:14px; }
  .tabs { display:flex; gap:8px; margin:16px 0 20px; }
  .tab { flex:1; padding:10px; border-radius:12px; cursor:pointer; text-align:center;

    color:var(--muted); font-family:"Nanum Myeongjo",serif; font-size:15px; }

  label { display:block; font-size:15px; margin-bottom:10px; color:var(--gold-soft); }
  textarea { width:100%; padding:14px; border-radius:12px; resize:none; outline:none;

    color:var(--cream); font-size:15px; font-family:"Gowun Dodum",sans-serif; }
  textarea::placeholder { color:#7d75a3; }
  .btn { width:100%; margin-top:12px; padding:15px; border-radius:14px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#2a1a0a;
    font-size:16px; font-weight:700; font-family:"Nanum Myeongjo",serif; letter-spacing:2px;
    transition:transform .15s, filter .15s; }
  .btn:hover { transform:translateY(-2px); filter:brightness(1.08); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.ghost { background:rgba(233,196,106,.12); border:1px solid var(--gold); color:var(--gold-soft); }
  .btn.plain { background:transparent; color:#8a82ac; font-family:"Gowun Dodum",sans-serif; font-size:14px; }
  .note { color:#6f6796; font-size:11px; text-align:center; margin-top:12px; }
  .qline { text-align:center; color:var(--muted); font-size:14px; margin-bottom:16px; }
  .qline b { color:var(--gold-soft); }
  @keyframes dealIn { from{opacity:0;transform:perspective(900px) rotateY(85deg) translateY(10px);} to{opacity:1;transform:perspective(900px) rotateY(0) translateY(0);} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .spread { display:flex; gap:10px; justify-content:center; }
  .col { flex:1; max-width:33%; }
  .pos { text-align:center; font-size:12px; color:var(--gold-soft); letter-spacing:1px; margin-bottom:6px; font-family:"Nanum Myeongjo",serif; }
  .mini { border-radius:13px; overflow:hidden; border:2px solid var(--gold);
    background:linear-gradient(160deg,#3a2a6e,#1c1442);
    box-shadow:0 8px 20px rgba(0,0,0,.45);
    animation:dealIn .7s cubic-bezier(.2,.8,.2,1) both; }
  .mpic { position:relative; height:210px; background:#0d0a1f; display:flex; align-items:center; justify-content:center; }
  .mpic img { width:100%; height:100%; object-fit:contain; }
  .mbadge { position:absolute; top:6px; left:6px; font-size:10px; font-weight:700; color:#2a1a0a;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); padding:1px 7px; border-radius:12px; }
  .mrev { position:absolute; top:6px; right:6px; font-size:9px; color:var(--cream);
    background:rgba(0,0,0,.55); padding:1px 6px; border-radius:12px; border:1px solid var(--gold); }
  .mname { font-family:"Nanum Myeongjo",serif; font-weight:700; font-size:13px; text-align:center; padding:7px 2px 8px; }
  .spreadmark { text-align:center; font-size:9px; letter-spacing:3px; color:rgba(244,213,141,.55); margin-top:8px; }
  .reading { margin-top:14px; }
  .rblock { background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.22);
    border-radius:14px; padding:14px 16px; margin-bottom:10px; line-height:1.65; font-size:14px;
    animation:fadeUp .5s ease both; }
  .rlabel { display:block; font-family:"Nanum Myeongjo",serif; font-weight:700; font-size:14px;
    color:var(--gold-soft); margin-bottom:5px; }
  .rclose { background:linear-gradient(160deg,rgba(233,196,106,.16),rgba(233,196,106,.06));
    border:1px solid rgba(233,196,106,.35); border-radius:14px; padding:14px 16px;
    line-height:1.65; font-size:14px; animation:fadeUp .5s ease both; }
  .rclose b { color:var(--gold-soft); }
  .spin { width:26px; height:26px; border:3px solid rgba(233,196,106,.25); border-top-color:var(--gold);
    border-radius:50%; margin:6px auto 12px; animation:spin .8s linear infinite; }
  .loadbox { background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.22);
    border-radius:14px; padding:18px; text-align:center; color:var(--muted); }
  .entry { margin-bottom:30px; }
  .divider { border-top:1px solid rgba(233,196,106,.2); padding-top:18px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cell { border:1px solid rgba(233,196,106,.3); border-radius:10px; overflow:hidden; background:#0d0a1f; }
  .cell img { width:100%; aspect-ratio:5/8; object-fit:contain; display:block; background:#0d0a1f; }

  .hide { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">✦ FATE TAROT ✦</div>
    <h1>운명타로</h1>
    <div class="sub">과거·현재·미래, 세 장으로 보는 운명</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabDraw" onclick="showTab('draw')">🔮 점 보기</div>
    <div class="tab" id="tabGallery" onclick="showTab('gallery')">🎴 78장 갤러리</div>
  </div>

  <div id="draw">
    <div id="askBox">
      <label>무엇이 궁금해? 마음속 질문을 적어줘.</label>
      <textarea id="q" rows="3" placeholder="예) 내 미래의 직업은 어떤 모습일까?"></textarea>
      <button class="btn" id="drawBtn" onclick="firstDraw()">🔮 과거·현재·미래 3장 펼치기</button>
      <div class="note">78장 중 서로 다른 3장을 무작위로 뽑아요</div>
    </div>
    <div id="reading" class="hide">
      <div id="thread"></div>
      <div class="divider">
        <label>더 깊이 들어가 볼까? 이어서 물어봐.</label>
        <textarea id="q2" rows="2" placeholder="예) 그 직업에서 성공하려면 뭐가 필요할까?"></textarea>
        <button class="btn" id="moreBtn" onclick="moreDraw()">🃏 새로 3장 더 펼치기</button>
      </div>
      <button class="btn ghost" id="shareBtn" onclick="share()">💌 상담 전체 공유하기</button>
      <div id="shareBox"></div>
      <div class="note">📸 화면을 캡처해서 친구에게 자랑해도 좋아요!</div>
      <button class="btn plain" onclick="resetAll()">✦ 처음부터 다시</button>
      <div class="note">운명타로는 재미로 보는 콘텐츠예요 :)</div>
    </div>
  </div>

  <div id="gallery" class="hide">
    <div class="note" style="margin-top:0;margin-bottom:12px">스크롤하면 78장의 진짜 타로 그림이 모두 떠요 ✦</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

    const idx = [...Array(CARDS.length).keys()];
    for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }

      const c = cc.card, rev = cc.reversed;
      return `<div class="col"><div class="pos">${POSITIONS[i]}</div>
        <div class="mini" style="animation-delay:${(i*0.22).toFixed(2)}s">
        <div class="mpic"><img src="${c.img}" alt="${esc(c.ko)}" style="transform:${rev?'rotate(180deg)':'none'}" />
        <div class="mbadge">${c.badge}</div>${rev?'<div class="mrev">역</div>':''}</div>
        <div class="mname">${esc(c.ko)}</div></div></div>`;
    }).join("");
    return `<div class="spread">${cols}</div><div class="spreadmark">✦ 운명타로 ✦</div>`;
  }

  // 풀이 영역: 로딩 / 오류 / 과거·현재·미래 따로 + 총평
  function readingBody(e){
    if(e.loading) return '<div class="loadbox"><div class="spin"></div>세 장의 기운을 읽는 중...</div>';
    if(e.error) return '<div class="loadbox" style="color:#ff9d9d">운명의 기운이 잠시 흐려졌어. 다시 펼쳐볼래?</div>';
    const d = e.data;
    if(d && d.past && d.present && d.future){
      const row=(i,txt)=>`<div class="rblock" style="animation-delay:${(i*0.12).toFixed(2)}s"><span class="rlabel">${POSITIONS[i]} · ${esc(e.cards[i].card.ko)}</span>${esc(txt)}</div>`;
      return row(0,d.past)+row(1,d.present)+row(2,d.future)
        + (d.closing?`<div class="rclose"><b>총평 ✦</b> ${esc(d.closing)}</div>`:"");
    }
    // JSON 파싱 실패 시: 통째로라도 보여주기
    return `<div class="rblock">${esc(e.raw||"")}</div>`;
  }

  function renderThread(){
    document.getElementById("thread").innerHTML = entries.map((e,i)=>
      `<div class="entry"><div class="qline"><b>Q${i+1}.</b> ${esc(e.q)}</div>${spreadHTML(e.cards)}<div class="reading" id="reading-${e.id}">${readingBody(e)}</div></div>`
    ).join("");
  }
  function updateReading(e){
    const el = document.getElementById("reading-"+e.id);
    if(el) el.innerHTML = readingBody(e);
  }

  function buildPrompt(prior, q, cards){
    const persona = "너는 '운명타로' 앱의 신비로운 타로 마스터야. 딱딱하지 않고 친한 친구처럼 편하게 반말로 얘기해.";
    const spreadStr = cards.map((cc,i)=>`${POSITIONS[i]} - ${cc.card.ko}(${cc.card.en}) ${cc.reversed?'역방향':'정방향'}`).join(", ");
    let ctx = "";
    if(prior.length){
      ctx = "지금까지의 상담 흐름:\n" + prior.map((e,i)=>{
        const s = e.cards.map((cc,j)=>`${POSITIONS[j]} ${cc.card.ko}(${cc.reversed?'역':'정'})`).join(", ");
        const sum = e.data ? `${e.data.past} / ${e.data.present} / ${e.data.future}` : (e.raw||"");
        return `${i+1}) 질문 "${e.q}" → [${s}] → 풀이: ${sum}`;
      }).join("\n") + "\n\n";
    }
    return persona + "\n" + ctx + (prior.length?"이어지는 추가 질문":"질문") + `: "${q}"\n`
      + `이번에 과거·현재·미래 3장을 뽑았어: ${spreadStr}\n`
      + (prior.length ? "앞의 상담 흐름과도 자연스럽게 이어서, " : "")
      + "각 카드를 그 자리(과거/현재/미래)의 의미로 풀어줘.\n\n"
      + "반드시 아래 JSON 형식으로만 답해. 다른 말이나 마크다운(```)은 절대 붙이지 마.\n"
      + '{"past":"과거 카드 풀이 1~2문장","present":"현재 카드 풀이 1~2문장","future":"미래 카드 풀이 1~2문장","closing":"세 장을 아우르는 따뜻한 한마디 1문장"}\n\n'
      + "조건: 한국어, 친구처럼 편한 반말, 각 카드 이름을 자연스럽게 언급, 신비롭지만 무겁지 않게, 가볍게 재미로 보는 분위기.";
  }

  async function callAI(prompt){
    const r = await fetch("/api/reading", {
      method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ prompt })
    });
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error || "오류");
    return d.text;
  }

  function parseReading(text){
    try {
      let t = String(text).replace(/```json/gi,"").replace(/```/g,"").trim();
      const a = t.indexOf("{"), b = t.lastIndexOf("}");
      if(a>=0 && b>a) t = t.slice(a, b+1);
      const obj = JSON.parse(t);
      if(obj && obj.past && obj.present && obj.future) return obj;
    } catch(e){}
    return null;
  }

  async function draw(q){
    const cards = pick3();
    const prior = entries.slice();
    const entry = { id: ++seq, q, cards, data:null, raw:"", loading:true, error:false };
    entries.push(entry);
    document.getElementById("askBox").classList.add("hide");
    document.getElementById("reading").classList.remove("hide");
    document.getElementById("shareBox").innerHTML = "";
    document.getElementById("moreBtn").disabled = true;
    renderThread();
    window.scrollTo({ top: 0, behavior: "smooth" });
    try {
      const text = await callAI(buildPrompt(prior, q, cards));
      entry.raw = text;
      entry.data = parseReading(text);
    } catch(e) {
      entry.error = true;
    } finally {
      entry.loading = false;
      document.getElementById("moreBtn").disabled = false;
      updateReading(entry);
    }
  }

  function firstDraw(){
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    draw(q);
  }
  function moreDraw(){
    const el = document.getElementById("q2");
    const q = el.value.trim();
    if(!q) return;
    el.value = "";
    draw(q);
  }
  function resetAll(){
    entries = [];
    document.getElementById("q").value = "";
    document.getElementById("reading").classList.add("hide");
    document.getElementById("askBox").classList.remove("hide");
  }

  function shareText(){
    return "🔮 운명타로\n\n" + entries.map((e,i)=>{
      const s = e.cards.map((cc,j)=>`${POSITIONS[j]} ${cc.card.ko}${cc.reversed?'(역)':''}`).join(" / ");
      let body = "";
      if(e.data) body = `과거: ${e.data.past}\n현재: ${e.data.present}\n미래: ${e.data.future}` + (e.data.closing?`\n총평: ${e.data.closing}`:"");
      else body = e.raw||"";
      return `Q${i+1}. ${e.q}\n[${s}]\n${body}`;
    }).join("\n\n") + "\n\n— 운명타로에서 뽑았어 ✦";
  }
  async function share(){
    if(!entries.length) return;
    const text = shareText();
    if(navigator.share){ try { await navigator.share({title:"운명타로 🔮", text}); return; } catch(e){} }
    try { await navigator.clipboard.writeText(text); } catch(e){}
    document.getElementById("shareBox").innerHTML =
      `<p style="color:var(--gold-soft);font-size:13px;margin:12px 0 6px">아래 글을 복사해서 친구에게 보내봐 👇</p>
       <textarea readonly rows="10" onclick="this.select()" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--gold);background:rgba(0,0,0,.25);color:var(--cream);font-size:13px;line-height:1.6">${esc(text)}</textarea>`;
    const ta = document.querySelector("#shareBox textarea"); if(ta){ ta.focus(); ta.select(); }
  }

  function showTab(which){
    const isDraw = which === "draw";
    document.getElementById("draw").classList.toggle("hide", !isDraw);
    document.getElementById("gallery").classList.toggle("hide", isDraw);
    document.getElementById("tabDraw").classList.toggle("active", isDraw);
    document.getElementById("tabGallery").classList.toggle("active", !isDraw);
    if(!isDraw) buildGallery();
  }
  let galleryBuilt = false;
  function buildGallery(){
    if(galleryBuilt) return; galleryBuilt = true;
    document.getElementById("grid").innerHTML = CARDS.map(c=>`<div class="cell"><img loading="lazy" src="${c.img}" alt="${esc(c.ko)}" /><div class="cn">${esc(c.ko)}</div></div>`).join("");
  }
</script>
</body>
</html>
