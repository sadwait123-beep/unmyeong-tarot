<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>운명타로</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<style>
  :root { --gold:#e9c46a; --gold-soft:#f4d58d; --cream:#f3ead3; --muted:#b6abd6; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; padding:28px 16px 60px;
    background: radial-gradient(circle at 30% 8%, #2a1a4e 0%, #150f33 45%, #0a0820 100%);
    color: var(--cream); font-family:"Gowun Dodum",sans-serif; }
  .wrap { max-width:480px; margin:0 auto; }
  .head { text-align:center; margin-bottom:18px; }
  .kicker { font-size:12px; letter-spacing:6px; color:var(--gold); }
  h1 { font-family:"Nanum Myeongjo",serif; font-weight:800; font-size:38px; margin:6px 0 4px;
    text-shadow:0 0 18px rgba(233,196,106,.35); }
  .sub { color:var(--muted); font-size:14px; }
  .tabs { display:flex; gap:8px; margin:16px 0 20px; }
  .tab { flex:1; padding:10px; border-radius:12px; cursor:pointer; text-align:center;
    border:1px solid rgba(233,196,106,.4); background:rgba(255,255,255,.04);
    color:var(--muted); font-family:"Nanum Myeongjo",serif; font-size:15px; }
  .tab.active { background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#2a1a0a; font-weight:700; }
  label { display:block; font-size:15px; margin-bottom:10px; color:var(--gold-soft); }
  textarea { width:100%; padding:14px; border-radius:12px; resize:none; outline:none;
    border:1px solid rgba(233,196,106,.4); background:rgba(255,255,255,.04);
    color:var(--cream); font-size:15px; font-family:"Gowun Dodum",sans-serif; }
  textarea::placeholder { color:#7d75a3; }
  .btn { width:100%; margin-top:12px; padding:15px; border-radius:14px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#2a1a0a;
    font-size:16px; font-weight:700; font-family:"Nanum Myeongjo",serif; letter-spacing:2px;
    transition:transform .15s, filter .15s; }
  .btn:hover { transform:translateY(-2px); filter:brightness(1.08); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.ghost { background:rgba(233,196,106,.12); border:1px solid var(--gold); color:var(--gold-soft); }
  .btn.plain { background:transparent; color:#8a82ac; font-family:"Gowun Dodum",sans-serif; font-size:14px; }
  .note { color:#6f6796; font-size:11px; text-align:center; margin-top:12px; }
  .qline { text-align:center; color:var(--muted); font-size:14px; margin-bottom:14px; }
  .qline b { color:var(--gold-soft); }
  .card { width:230px; margin:0 auto; border-radius:16px; overflow:hidden; border:2px solid var(--gold);
    box-shadow:0 0 0 1px rgba(244,213,141,.35) inset, 0 14px 32px rgba(0,0,0,.5);
    background:linear-gradient(160deg,#3a2a6e,#1c1442);
    animation:dealIn .8s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes dealIn { from{opacity:0;transform:perspective(900px) rotateY(78deg);} to{opacity:1;transform:perspective(900px) rotateY(0);} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pic { position:relative; height:350px; background:#0d0a1f; display:flex; align-items:center; justify-content:center; }
  .pic img { width:100%; height:100%; object-fit:contain; }
  .badge { position:absolute; top:8px; left:8px; font-size:11px; font-weight:700; color:#2a1a0a;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft)); padding:2px 9px; border-radius:20px; }
  .rev { position:absolute; top:8px; right:8px; font-size:10px; font-weight:700; color:var(--cream);
    background:rgba(0,0,0,.55); padding:2px 8px; border-radius:20px; border:1px solid var(--gold); }
  .strip { padding:10px 8px 9px; text-align:center; }
  .arc { font-size:10px; color:var(--gold-soft); letter-spacing:1px; }
  .nm { font-family:"Nanum Myeongjo",serif; font-weight:700; font-size:20px; margin-top:2px; }
  .en { font-size:10px; color:var(--muted); }
  .mark { margin-top:6px; font-size:9px; letter-spacing:3px; color:rgba(244,213,141,.55); }
  .reading { margin-top:16px; background:rgba(255,255,255,.05); border:1px solid rgba(233,196,106,.25);
    border-radius:16px; padding:18px; line-height:1.7; font-size:15px; min-height:60px; }
  .spin { width:24px; height:24px; border:3px solid rgba(233,196,106,.25); border-top-color:var(--gold);
    border-radius:50%; margin:2px auto 10px; animation:spin .8s linear infinite; }
  .entry { margin-bottom:28px; }
  .divider { border-top:1px solid rgba(233,196,106,.2); padding-top:18px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cell { border:1px solid rgba(233,196,106,.3); border-radius:10px; overflow:hidden; background:#0d0a1f; }
  .cell img { width:100%; aspect-ratio:5/8; object-fit:contain; display:block; background:#0d0a1f; }
  .cell .cn { font-size:11px; text-align:center; padding:5px 2px; }
  .hide { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">✦ FATE TAROT ✦</div>
    <h1>운명타로</h1>
    <div class="sub">궁금한 걸 묻고, 꼬리에 꼬리를 무는 운명을 확인해봐</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabDraw" onclick="showTab('draw')">🔮 점 보기</div>
    <div class="tab" id="tabGallery" onclick="showTab('gallery')">🎴 78장 갤러리</div>
  </div>

  <div id="draw">
    <div id="askBox">
      <label>무엇이 궁금해? 마음속 질문을 적어줘.</label>
      <textarea id="q" rows="3" placeholder="예) 내 미래의 직업은 어떤 모습일까?"></textarea>
      <button class="btn" id="drawBtn" onclick="firstDraw()">🔮 카드 뽑기</button>
      <div class="note">전체 78장 중 한 장을 무작위로 뽑아요</div>
    </div>
    <div id="reading" class="hide">
      <div id="thread"></div>
      <div class="divider">
        <label>더 깊이 들어가 볼까? 이어서 물어봐.</label>
        <textarea id="q2" rows="2" placeholder="예) 그 직업에서 성공하려면 뭐가 필요할까?"></textarea>
        <button class="btn" id="moreBtn" onclick="moreDraw()">🃏 카드 한 장 더 뽑기</button>
      </div>
      <button class="btn ghost" id="shareBtn" onclick="share()">💌 상담 전체 공유하기</button>
      <div id="shareBox"></div>
      <div class="note">📸 화면을 캡처해서 친구에게 자랑해도 좋아요!</div>
      <button class="btn plain" onclick="resetAll()">✦ 처음부터 다시</button>
      <div class="note">운명타로는 재미로 보는 콘텐츠예요 :)</div>
    </div>
  </div>

  <div id="gallery" class="hide">
    <div class="note" style="margin-top:0;margin-bottom:12px">스크롤하면 78장의 진짜 타로 그림이 모두 떠요 ✦</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

  const CARDS = [];

  CARDS.forEach((c,i)=>c.img=CARD_IMG[i]);

  let entries = [];

  function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function cardHTML(c, reversed){
    return `<div class="card"><div class="pic">
      <img src="${c.img}" alt="${esc(c.ko)}" style="transform:${reversed?'rotate(180deg)':'none'}" />
      <div class="badge">${c.badge}</div>${reversed?'<div class="rev">역방향</div>':''}
      </div><div class="strip">
      <div class="arc">${c.arcana}</div><div class="nm">${esc(c.ko)}</div>
      <div class="en">${c.en}</div><div class="mark">✦ 운명타로 ✦</div></div></div>`;
  }

  function renderThread(){
    document.getElementById("thread").innerHTML = entries.map((e,i)=>{
      let body;
      if(e.loading) body = '<div class="spin"></div><div style="text-align:center;color:var(--muted)">카드의 기운을 읽는 중...</div>';

      else body = esc(e.reading);
      return `<div class="entry"><div class="qline"><b>Q${i+1}.</b> ${esc(e.q)}</div>${cardHTML(e.card,e.reversed)}<div class="reading">${body}</div></div>`;
    }).join("");
  }

  function buildPrompt(prior, q, card, reversed){

    let ctx = "";
    if(prior.length){
      ctx = "지금까지의 상담 흐름:\n" + prior.map((e,i)=>`${i+1}) 질문 "${e.q}" → 카드 ${e.card.ko}(${e.reversed?'역':'정'}) → 풀이: ${e.reading}`).join("\n") + "\n\n";
    }
    return persona + "\n" + ctx + (prior.length?"이어지는 추가 질문":"질문") + `: "${q}"\n`
      + `이번에 뽑은 카드: ${card.ko} (${card.en}) - ${reversed?'역방향':'정방향'}\n`
      + (prior.length
          ? "앞의 흐름을 자연스럽게 이어받아서, 이번 카드로 이 질문에 더 깊이 있게 답해줘. 가능하면 앞에 나온 카드와 연결지어 이야기해줘."
          : "이 카드 한 장으로 질문에 따뜻하고 재미있게 답해줘.")
      + "\n\n규칙:\n- 한국어로 3~5문장 정도\n- 신비롭지만 너무 무겁지 않게\n- 카드 이름을 자연스럽게 한 번 언급\n- 마지막은 기운 나는 한마디로 마무리\n- 가볍게 재미로 보는 분위기 유지";
  }

  async function callAI(prompt){
    const r = await fetch("/api/reading", {
      method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ prompt })
    });
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error || "오류");
    return d.text;
  }

  async function draw(q){
    const card = CARDS[Math.floor(Math.random()*CARDS.length)];
    const reversed = Math.random() < 0.4;
    const prior = entries.slice();
    const entry = { q, card, reversed, reading:"", loading:true, error:false };
    entries.push(entry);
    document.getElementById("askBox").classList.add("hide");
    document.getElementById("reading").classList.remove("hide");
    document.getElementById("shareBox").innerHTML = "";
    document.getElementById("moreBtn").disabled = true;
    renderThread();
    window.scrollTo({ top: 0, behavior: "smooth" });
    try {
      entry.reading = await callAI(buildPrompt(prior, q, card, reversed));
    } catch(e) {
      entry.error = true;
    } finally {
      entry.loading = false;
      document.getElementById("moreBtn").disabled = false;
      renderThread();
    }
  }

  function firstDraw(){
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    draw(q);
  }
  function moreDraw(){
    const el = document.getElementById("q2");
    const q = el.value.trim();
    if(!q) return;
    el.value = "";
    draw(q);
  }
  function resetAll(){
    entries = [];
    document.getElementById("q").value = "";
    document.getElementById("reading").classList.add("hide");
    document.getElementById("askBox").classList.remove("hide");
  }

  function shareText(){
    return "🔮 운명타로\n\n" + entries.map((e,i)=>`Q${i+1}. ${e.q}\n[${e.card.ko}${e.reversed?' 역':''}] ${e.reading}`).join("\n\n") + "\n\n— 운명타로에서 뽑았어 ✦";
  }
  async function share(){
    if(!entries.length) return;
    const text = shareText();
    if(navigator.share){ try { await navigator.share({title:"운명타로 🔮", text}); return; } catch(e){} }
    try { await navigator.clipboard.writeText(text); } catch(e){}
    document.getElementById("shareBox").innerHTML =
      `<p style="color:var(--gold-soft);font-size:13px;margin:12px 0 6px">아래 글을 복사해서 친구에게 보내봐 👇</p>
       <textarea readonly rows="8" onclick="this.select()" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--gold);background:rgba(0,0,0,.25);color:var(--cream);font-size:13px;line-height:1.6">${esc(text)}</textarea>`;
    const ta = document.querySelector("#shareBox textarea"); if(ta){ ta.focus(); ta.select(); }
  }

  function showTab(which){
    const isDraw = which === "draw";
    document.getElementById("draw").classList.toggle("hide", !isDraw);
    document.getElementById("gallery").classList.toggle("hide", isDraw);
    document.getElementById("tabDraw").classList.toggle("active", isDraw);
    document.getElementById("tabGallery").classList.toggle("active", !isDraw);
    if(!isDraw) buildGallery();
  }
  let galleryBuilt = false;
  function buildGallery(){
    if(galleryBuilt) return; galleryBuilt = true;
    document.getElementById("grid").innerHTML = CARDS.map(c=>`<div class="cell"><img loading="lazy" src="${c.img}" alt="${esc(c.ko)}" /><div class="cn">${esc(c.ko)}</div></div>`).join("");
  }
</script>
</body>
</html>
